spring.application.name=Metas
server.port=5051
ixc.base-url=https://central.planetinternetprovedor.com.br/webservice/v1/
ixc.test-url=https://central.planetinternetprovedor.com.br/webservice/v1/usuarios
ixc.auth=${IXC_AUTH}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/metas?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.open-in-view=false

metas.cache.scheduler.enabled=${METAS_CACHE_SCHEDULER_ENABLED:true}
metas.cache.scheduler.cron=${METAS_CACHE_SCHEDULER_CRON:0 0 6,12 * * *}
metas.cache.scheduler.zone=${METAS_CACHE_SCHEDULER_ZONE:America/Sao_Paulo}
metas.cache.scheduler.data-inicial=${METAS_CACHE_SCHEDULER_DATA_INICIAL:2026-01-01}
